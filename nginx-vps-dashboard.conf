# VPS Dashboard — Nginx reverse proxy config
# Place at: /etc/nginx/sites-available/vps-dashboard
# Enable:  ln -s /etc/nginx/sites-available/vps-dashboard /etc/nginx/sites-enabled/
# Test:    nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name dash.YOUR_DOMAIN.com;   # ← 部署时替换为实际域名

    location / {
        proxy_pass http://127.0.0.1:9090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
